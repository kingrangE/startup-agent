#
# 두 겹의 라벨:
#   expected_verdict : 기대 판정 (strong / acceptable / needs_work)
#                      — Agent 시스템의 overall_verdict와 대조하기 위함
#   human_scores     : 이 아이디어로 "생성된 캔버스"를 사람이 4차원 1~5점으로 채점
#                      — judge 점수와 대조하기 위함 (MAE,편향) 미채점은 null
#
# 평가 방식:
#   1) python -m evals generate-canvases  → evals/data/canvases_for_labeling.md 생성
#   2) 문서를 보고 각 항목의 human_scores를 채운다. 예:
#        human_scores: {specificity: 4, evidence: 3, coherence: 4, differentiation: 3}
#

